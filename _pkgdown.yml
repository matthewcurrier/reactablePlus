url: https://matthewcurrier.github.io/reactablePlus/

template:
  bootstrap: 5
  bootswatch: flatly

navbar:
  structure:
    left:  [intro, reference, articles]
    right: [search, github]
  components:
    github:
      icon: fa-github
      href: https://github.com/matthewcurrier/reactablePlus/
      aria-label: GitHub

reference:
  - title: "Setup"
    desc: >
      Load widget dependencies and wire picker bindings inside reactable.
    contents:
      - useReactablePlus
      - popoverDep
      - bindPickersOnRender
      - runExample

  - title: "Picker Widgets"
    desc: >
      Input constructors and update functions for inline cell editors.
      Each widget has a Shiny input binding, so its value is available
      via `input$<id>` on the server side.
    contents:
      - searchPickerInput
      - updateSearchPickerInput
      - useTypeaheadSearch
      - attendancePickerInput
      - updateAttendancePickerInput
      - homeschoolPickerInput
      - updateHomeschoolPickerInput
      - notesInput
      - updateNotesInput
      - gearPopoverInput
      - updateGearPopoverInput

  - title: "Config-Driven Table Module"
    desc: >
      A Shiny module that renders an editable table from a declarative
      `table_config` object. Handles widget dispatch, mutual exclusion,
      fill-down, gear toggles, and data marshaling.
    contents:
      - config_table_ui
      - config_table_server
      - table_config
      - widget_col
      - normalize_choices

  - title: "Grade Utilities"
    desc: >
      Helper functions for working with grade-level keys (PK through 12).
      Convenience utilities for education-domain applications; not
      required by the core table infrastructure.
    contents:
      - gradeChoices
      - gradeLabelMap
      - gradeIndex
      - gradeInRange
